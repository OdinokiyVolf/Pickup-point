  <script>
    // Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js')
        .then(() => console.log('✅ SW зарегистрирован'))
        .catch(err => console.error('❌ Ошибка SW:', err));
    }

    // ========== Логика для Android (Chrome / Edge) ==========
    let deferredPrompt;
    const installBtn = document.getElementById('install-banner');

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installBtn.style.display = 'flex';
    });

    installBtn.onclick = async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      console.log('📲 Установка PWA:', outcome);
      deferredPrompt = null;
      installBtn.style.display = 'none';
    };

    // Если приложение уже установлено — скрываем кнопку
    window.addEventListener('appinstalled', () => {
      installBtn.style.display = 'none';
      deferredPrompt = null;
      console.log('✅ PWA успешно установлено');
    });
  </script>
