  <meta name="description" content="Пункт выдачи заказов на Тищенко, 2. Озон, Wildberries.">

  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="logo.png" type="image/png">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="ПВЗ Тищенко">
  <link rel="apple-touch-icon" href="logo.png">

  <meta name="msapplication-TileImage" content="logo.png">
  <meta name="msapplication-TileColor" content="#4a7c59">
  <meta name="theme-color" content="#4a7c59">

  <script src="https://unpkg.com/lucide@latest"></script>

  <script>
    (function(m,e,t,r,i,k,a){m[i]=m[i]||function(){(m[i].a=m[i].a||[]).push(arguments)};
    m[i].l=1*new Date();
    for (var j = 0; j < document.scripts.length; j++) {if (document.scripts[j].src === r) { return; }}
    k=e.createElement(t),a=e.getElementsByTagName(t)[0],k.async=1,k.src=r,a.parentNode.insertBefore(k,a)})
    (window, document, "script", "https://mc.yandex.ru/metrika/tag.js", "ym");
    ym(109024144, "init", { clickmap:true, trackLinks:true, accurateTrackBounce:true, webvisor:true });
  </script>
</head>
<body>

  <main class="main-container">
    <div class="card">
      <img src="logo.png" alt="Логотип ПВЗ" class="avatar">
      <h1 class="title">ПВЗ на Тищенко, 2</h1>
      <p class="subtitle">Для лучшего качества скриншотов открывайте инструкции через компьютер</p>

      <nav class="button-group">
        <a href="https://ozon.ru/point/1402634" target="_blank" rel="noopener noreferrer" class="menu-button">
          <span>Адрес пункта Озон</span>
          <i data-lucide="map-pin"></i>
        </a>
        <a href="https://dzen.ru/a/aeh5mmCZ_2Jl9kNS?share_to=link" target="_blank" rel="noopener noreferrer" class="menu-button">
          <span>Как заказать на WB</span>
          <i data-lucide="shopping-bag"></i>
        </a>
        <a href="https://dzen.ru/a/aei7_9gcLjiKbk3D?share_to=link" target="_blank" rel="noopener noreferrer" class="menu-button">
          <span>Оформить возврат</span>
          <i data-lucide="refresh-ccw"></i>
        </a>
      </nav>
    </div>
  </main>

  <button id="install-banner" aria-label="Установить приложение">
    <i data-lucide="download-cloud"></i>
    <span>Установить на экран</span>
  </button>

  <div id="ios-hint" role="dialog">
    <button id="ios-hint-close">✕</button>
    <p>Чтобы установить приложение на iPhone:</p>
    <div class="ios-arrow">⬆️</div>
    <p>Нажмите <strong>«Поделиться»</strong>,<br> затем <strong>«На экран "Домой"»</strong></p>
  </div>

  <script>
    // Инициализация иконок
    lucide.createIcons();

    // Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(console.error);
    }

    // Логика установки (iOS/Android)
    const isIos = /iphone|ipad|ipod/i.test(navigator.userAgent);
    const isInStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;

    if (isIos && !isInStandalone) {
      setTimeout(() => document.getElementById('ios-hint').classList.add('visible'), 2000);
    }

    document.getElementById('ios-hint-close').onclick = () => document.getElementById('ios-hint').classList.remove('visible');

    let deferredPrompt;
    const installBtn = document.getElementById('install-banner');

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installBtn.classList.add('visible');
    });

    installBtn.onclick = async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      deferredPrompt = null;
      installBtn.classList.remove('visible');
    };
  </script>
</body>
</html>
