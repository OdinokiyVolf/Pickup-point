<body>

  <div class="main-container">
    <div class="card">
      <img src="logo.png" alt="Логотип ПВЗ" class="avatar">
      <h1 class="title">ПВЗ на Тищенко, 2</h1>
      <p class="subtitle">Для лучшего качества скриншотов открывайте инструкции через компьютер</p>

      <div class="button-group">
        <a href="https://ozon.ru/point/1402634" target="_blank" rel="noopener noreferrer" class="menu-button">Адрес пункта Озон</a>
        <a href="https://dzen.ru/a/aeh5mmCZ_2Jl9kNS?share_to=link" target="_blank" rel="noopener noreferrer" class="menu-button">Как заказать товары с WB?</a>

      </div>
    </div>
  </div>

  <button id="install-banner" aria-label="Установить приложение">
    <span>📲</span> Установить на экран
  </button>

  <div id="ios-hint" role="dialog" aria-label="Инструкция по установке">
    <button id="ios-hint-close" aria-label="Закрыть">✕</button>
    <p>Чтобы установить приложение на iPhone&nbsp;/ iPad:</p>
    <p class="arrow">⬆️</p>
    <p>Нажмите <strong>«Поделиться»</strong> в Safari,<br>
    затем выберите <strong>«На экран "Домой"»</strong></p>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(err => console.error(err));
    }

    const isIos = /iphone|ipad|ipod/i.test(navigator.userAgent);
    const isInStandaloneMode = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;

    if (isIos && !isInStandaloneMode) {
      setTimeout(() => { document.getElementById('ios-hint').classList.add('visible'); }, 2000);
    }

    document.getElementById('ios-hint-close').addEventListener('click', () => {
      document.getElementById('ios-hint').classList.remove('visible');
    });

    let deferredPrompt = null;
    const installBtn = document.getElementById('install-banner');

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installBtn.classList.add('visible');
    });

    installBtn.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      deferredPrompt = null;
      installBtn.classList.remove('visible');
    });
  </script>
</body>
