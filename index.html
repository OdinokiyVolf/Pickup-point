  <style>
    /* Кнопка установки PWA — скрыта по умолчанию */
    #install-banner {
      display: none;
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);

      background: #4a7c59;

      white-space: nowrap;
      animation: slideUp 0.3s ease;
    }
    #install-banner.visible { display: flex; align-items: center; gap: 10px; }

    /* Инструкция для iOS Safari — скрыта по умолчанию */
    #ios-hint {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0; right: 0;
      z-index: 1000;
      background: #fff;
      border-top: 2px solid #4a7c59;
      padding: 18px 20px 28px;
      font-size: 15px;
      line-height: 1.5;
      text-align: center;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
    }
    #ios-hint.visible { display: block; }
    #ios-hint strong { color: #4a7c59; }
    #ios-hint-close {
      position: absolute;
      top: 10px; right: 16px;
      background: none; border: none;
      font-size: 22px; cursor: pointer; color: #666;
    }
    #ios-hint .arrow { font-size: 26px; }

    @keyframes slideUp {
      from { opacity: 0; transform: translateX(-50%) translateY(20px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
  </style>

<body>

  <div class="main-container">
    <div class="card">
      <img src="logo.png" alt="Логотип ПВЗ" class="avatar">
      <h1 class="title">ПВЗ на Тищенко, 2</h1>
      <p class="subtitle">Для лучшего качества скриншотов открывайте инструкции через компьютер</p>

      </div>
    </div>
  </div>

  <!-- Кнопка установки для Chrome / Edge / Android -->
  <button id="install-banner" aria-label="Установить приложение">
    <span>📲</span> Установить на экран
  </button>

  <!-- Подсказка для iOS Safari -->
  <div id="ios-hint" role="dialog" aria-label="Инструкция по установке">
    <button id="ios-hint-close" aria-label="Закрыть">✕</button>
    <p>Чтобы установить приложение на iPhone&nbsp;/ iPad:</p>
    <p class="arrow">⬆️</p>
    <p>Нажмите <strong>«Поделиться»</strong> в Safari,<br>
    затем выберите <strong>«На экран "Домой"»</strong></p>
  </div>

  <script>
    // ── Service Worker ──────────────────────────────────────────────
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js')
        .then(() => console.log('PWA: Service Worker готов'))
        .catch(err => console.error('PWA: Ошибка SW:', err));
    }

    // ── Определяем iOS Safari ───────────────────────────────────────
    const isIos = /iphone|ipad|ipod/i.test(navigator.userAgent);
    const isInStandaloneMode = window.matchMedia('(display-mode: standalone)').matches
                            || window.navigator.standalone === true;

    if (isIos && !isInStandaloneMode) {
      // Показываем подсказку через 2 секунды, чтобы не раздражать сразу
      setTimeout(() => {
        document.getElementById('ios-hint').classList.add('visible');
      }, 2000);
    }

    document.getElementById('ios-hint-close').addEventListener('click', () => {
      document.getElementById('ios-hint').classList.remove('visible');
    });

    // ── beforeinstallprompt — Chrome / Edge / Android ───────────────
    let deferredPrompt = null;
    const installBtn = document.getElementById('install-banner');

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();          // отменяем автоматический баннер
      deferredPrompt = e;
      installBtn.classList.add('visible');  // показываем нашу кнопку
    });

    installBtn.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      console.log('PWA install:', outcome);
      deferredPrompt = null;
      installBtn.classList.remove('visible');
    });

    // Скрываем кнопку, если приложение уже установлено
    window.addEventListener('appinstalled', () => {
      installBtn.classList.remove('visible');
      deferredPrompt = null;
      console.log('PWA: установлено');
    });
  </script>
</body>
